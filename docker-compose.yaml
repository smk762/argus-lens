services:
  argus-lens:
    build: .
    ports:
      - "${ARGUS_PORT:-8080}:8080"
    environment:
      - ARGUS_BACKEND=${ARGUS_BACKEND:-hybrid}
      # Cloud backends each read their own key variable.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - ARGUS_OPENAI_COMPAT_API_KEY=${ARGUS_OPENAI_COMPAT_API_KEY:-}
      - WD14_MODEL_DIR=/root/.cache/wd14_tagger
      - HF_HOME=/root/.cache/huggingface
      - HF_TRUST_REMOTE_CODE=${HF_TRUST_REMOTE_CODE:-false}
    volumes:
      - ~/.cache/wd14_tagger:/root/.cache/wd14_tagger:ro
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
